name: CI/CD Pipeline - Todo API

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:

  # ✅ JOB 1: Lint — check code quality
  lint:
    runs-on: ubuntu-latest
    name: Lint Code

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run lint check
        run: flake8 app.py --max-line-length=100

  # ✅ JOB 2: Test — run automatically after lint passes
  test:
    needs: lint
    runs-on: ubuntu-latest
    name: Run Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v

  # 🐳 JOB 3: Build & push — only runs if both lint and tests pass
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    name: Build and Push Docker Image

    env:
      IMAGE: ${{ secrets.DOCKER_USER }}/todo-api:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }} .

      - name: Push image to Docker Hub
        run: docker push ${{ env.IMAGE }}

      # Tag as :staging or :latest depending on which branch triggered the pipeline
      - name: Tag image by branch
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker tag ${{ env.IMAGE }} ${{ secrets.DOCKER_USER }}/todo-api:latest
            docker push ${{ secrets.DOCKER_USER }}/todo-api:latest
            echo "TAG=latest" >> $GITHUB_ENV
          else
            docker tag ${{ env.IMAGE }} ${{ secrets.DOCKER_USER }}/todo-api:staging
            docker push ${{ secrets.DOCKER_USER }}/todo-api:staging
            echo "TAG=staging" >> $GITHUB_ENV
          fi

      # 📋 Summary shown in GitHub Actions UI
      - name: Pipeline Summary
        run: |
          echo "## ✅ Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ env.TAG }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.IMAGE }} |" >> $GITHUB_STEP_SUMMARY